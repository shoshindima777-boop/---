<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Metro Editor v2 PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f14;
  overflow: hidden;
  color: white;
  user-select: none;
}

#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  position: relative;
  z-index: 10;
}

button, select {
  background: #1b2330;
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #273246;
}

button.active {
  background: #3b82f6;
  border-color: #60a5fa;
}

#hint {
  margin-left: auto;
  font-size: 12px;
  opacity: 0.7;
}

#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  position: relative;
  overflow: hidden;
  cursor: grab;
}

#wrap.panning {
  cursor: grabbing;
}

#world {
  position: absolute;
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

svg {
  position: absolute;
  width: 3000px;
  height: 2000px;
  pointer-events: none;
}

.station {
  position: absolute;
  cursor: grab;
  touch-action: none;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 3px solid #3b82f6;
  background: white;
  box-sizing: border-box;
}

.name {
  color: white;
  font-size: 13px;
  margin-left: 20px;
  margin-top: -18px;
  white-space: nowrap;
  pointer-events: none;
}

.selected .dot {
  transform: scale(1.3);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.5);
}
</style>
</head>

<body>

<div id="topbar">
  🚇 METRO EDITOR v2 PRO

  <button onclick="addStation()">➕ Station</button>
  <button id="lineBtn" onclick="toggleLine()">➖ Line</button>
  <button id="deleteBtn" onclick="toggleDelete()">🗑 Delete</button>
  <button onclick="exportMap()">💾 Export</button>
  <button onclick="importMap()">📂 Import</button>
  <button onclick="resetView()">🎯 Reset View</button>

  <select id="lineColor">
    <option value="#3b82f6">Blue</option>
    <option value="#ef4444">Red</option>
    <option value="#22c55e">Green</option>
    <option value="#f59e0b">Orange</option>
    <option value="#a855f7">Purple</option>
  </select>

  <span id="hint"></span>
</div>

<div id="wrap">
  <div id="world">
    <svg id="grid"></svg>
    <svg id="lines"></svg>
    <div id="stations"></div>
  </div>
</div>

<script>

/* STATE */
let stations = [];   // {id, name, x, y, color}
let lines = [];       // {color, stations: [id, id, ...]}
let nextId = 1;

let lineMode = false;
let deleteMode = false;
let currentLine = null;

let dragId = null;
let dragMoved = false;
let dragOffset = {x:0,y:0};

let panning = false;
let panStart = {x:0,y:0};
let panOrigin = {x:0,y:0};

let scale = 1;
let offsetX = 0;
let offsetY = 0;

const wrap = document.getElementById("wrap");
const world = document.getElementById("world");
const stationsEl = document.getElementById("stations");
const linesSvg = document.getElementById("lines");
const gridSvg = document.getElementById("grid");
const hint = document.getElementById("hint");

/* GRID */
function drawGrid() {
  const step = 50;
  const w = 3000;
  const h = 2000;
  const frag = document.createDocumentFragment();

  for (let x = 0; x <= w; x += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", x);
    l.setAttribute("y1", 0);
    l.setAttribute("x2", x);
    l.setAttribute("y2", h);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    frag.appendChild(l);
  }

  for (let y = 0; y <= h; y += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", 0);
    l.setAttribute("y1", y);
    l.setAttribute("x2", w);
    l.setAttribute("y2", y);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    frag.appendChild(l);
  }

  gridSvg.appendChild(frag);
}

/* HELPERS */
function getStation(id){
  return stations.find(s => s.id === id);
}

function curve(a,b) {
  const dx = (b.x - a.x) / 2;
  return `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`;
}

/* RENDER LINES */
function renderLines(){
  linesSvg.innerHTML="";

  lines.forEach(line=>{
    for(let i=0;i<line.stations.length-1;i++){
      const a=getStation(line.stations[i]);
      const b=getStation(line.stations[i+1]);
      if(!a||!b) continue;

      const p=document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d",curve(a,b));
      p.setAttribute("stroke",line.color);
      p.setAttribute("stroke-width","6");
      p.setAttribute("fill","none");
      p.setAttribute("stroke-linecap","round");

      linesSvg.appendChild(p);
    }
  });
}

/* RENDER STATIONS */
function renderStations(){
  stationsEl.innerHTML="";

  stations.forEach((s)=>{
    const el=document.createElement("div");
    el.className="station";
    if(currentLine && currentLine.stations.includes(s.id)){
      el.className += " selected";
    }

    el.style.left=s.x+"px";
    el.style.top=s.y+"px";

    el.innerHTML=`
      <div class="dot" style="border-color:${s.color}"></div>
      <div class="name">${s.name}</div>
    `;

    el.onmousedown=(e)=>{
      e.stopPropagation();

      if(deleteMode){
        deleteStation(s.id);
        return;
      }

      if(lineMode && currentLine){
        const arr = currentLine.stations;
        if(arr[arr.length-1] !== s.id){
          arr.push(s.id);
        }
        renderStations();
        renderLines();
        return;
      }

      dragId = s.id;
      dragMoved = false;
      dragOffset.x = e.clientX - s.x * scale;
      dragOffset.y = e.clientY - s.y * scale;
    };

    el.ondblclick=(e)=>{
      e.stopPropagation();
      const n=prompt("Name:",s.name);
      if(n) s.name=n;
      renderStations();
    };

    el.oncontextmenu=(e)=>{
      e.preventDefault();
      e.stopPropagation();
      const c=prompt("Color (hex):",s.color);
      if(c) s.color=c;
      renderStations();
      renderLines();
    };

    stationsEl.appendChild(el);
  });
}

/* RENDER ALL */
function render(){
  renderStations();
  renderLines();
}

/* ADD STATION */
function addStation(){
  stations.push({
    id: nextId++,
    name:"Station",
    x: (200+Math.random()*400 - offsetX)/scale,
    y: (200+Math.random()*300 - offsetY)/scale,
    color:"#3b82f6"
  });
  renderStations();
}

/* DELETE STATION */
function deleteStation(id){
  stations = stations.filter(s => s.id !== id);
  lines.forEach(l => {
    l.stations = l.stations.filter(sid => sid !== id);
  });
  lines = lines.filter(l => l.stations.length > 1 || l === currentLine);
  render();
}

/* LINE MODE */
function toggleLine(){
  lineMode=!lineMode;
  deleteMode=false;
  document.getElementById("deleteBtn").classList.remove("active");

  if(lineMode){
    currentLine={
      stations:[],
      color:document.getElementById("lineColor").value
    };
    lines.push(currentLine);
    hint.textContent = "Click stations in order to connect them. Click 'Line' again to finish.";
  } else {
    if(currentLine && currentLine.stations.length < 2){
      lines = lines.filter(l => l !== currentLine);
    }
    currentLine = null;
    hint.textContent = "";
  }

  document.getElementById("lineBtn").classList.toggle("active", lineMode);
  render();
}

/* DELETE MODE */
function toggleDelete(){
  deleteMode=!deleteMode;
  lineMode=false;
  document.getElementById("lineBtn").classList.remove("active");
  if(currentLine && currentLine.stations.length < 2){
    lines = lines.filter(l => l !== currentLine);
  }
  currentLine = null;

  document.getElementById("deleteBtn").classList.toggle("active", deleteMode);
  hint.textContent = deleteMode ? "Click a station to delete it." : "";
}

/* EXPORT */
function exportMap(){
  const data = JSON.stringify({stations,lines,nextId});
  navigator.clipboard.writeText(data).then(()=>{
    alert("Map JSON copied to clipboard!");
  }).catch(()=>{
    prompt("Copy the JSON below:", data);
  });
}

/* IMPORT */
function importMap(){
  const data = prompt("Paste map JSON:");
  if(!data) return;
  try{
    const parsed = JSON.parse(data);
    stations = parsed.stations || [];
    lines = parsed.lines || [];
    nextId = parsed.nextId || (Math.max(0, ...stations.map(s=>s.id)) + 1);
    currentLine = null;
    lineMode = false;
    deleteMode = false;
    document.getElementById("lineBtn").classList.remove("active");
    document.getElementById("deleteBtn").classList.remove("active");
    render();
  }catch(e){
    alert("Invalid JSON");
  }
}

/* RESET VIEW */
function resetView(){
  scale = 1;
  offsetX = 0;
  offsetY = 0;
  applyTransform();
}

function applyTransform(){
  world.style.transform = `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
}

/* PAN (only starts when clicking empty canvas) */
wrap.addEventListener("mousedown",(e)=>{
  if(e.target !== wrap && e.target !== world) return;
  if(dragId !== null) return;

  panning = true;
  wrap.classList.add("panning");
  panStart.x = e.clientX;
  panStart.y = e.clientY;
  panOrigin.x = offsetX;
  panOrigin.y = offsetY;
});

/* MOVE */
window.addEventListener("mousemove",(e)=>{

  if(dragId !== null){
    dragMoved = true;
    const s = getStation(dragId);
    if(s){
      s.x = (e.clientX - dragOffset.x) / scale;
      s.y = (e.clientY - dragOffset.y) / scale;
      render();
    }
    return;
  }

  if(panning){
    offsetX = panOrigin.x + (e.clientX - panStart.x);
    offsetY = panOrigin.y + (e.clientY - panStart.y);
    applyTransform();
  }
});

window.addEventListener("mouseup",()=>{
  dragId = null;
  panning = false;
  wrap.classList.remove("panning");
});

/* ZOOM (centered on cursor) */
wrap.addEventListener("wheel",(e)=>{
  e.preventDefault();

  const rect = wrap.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  const worldX = (mouseX - offsetX) / scale;
  const worldY = (mouseY - offsetY) / scale;

  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  scale = Math.min(Math.max(0.3, scale * factor), 3);

  offsetX = mouseX - worldX * scale;
  offsetY = mouseY - worldY * scale;

  applyTransform();
}, { passive:false });

/* INIT */
drawGrid();
render();
applyTransform();

</script>

</body>
</html>
