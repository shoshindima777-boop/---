<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>МЕТРОПАЛИТЕН-КПРС</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f14;
  overflow: hidden;
  color: white;
}

/* TOP */
#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-weight: bold;
}

button {
  background: #1b2330;
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* WRAP */
#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  position: relative;
  overflow: hidden;
  cursor: grab;
}

/* CANVAS (important fix) */
#canvas {
  position: absolute;
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

/* GRID */
.grid {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
}

/* STATIONS */
.station {
  position: absolute;
  cursor: grab;
  user-select: none;
}

.station .dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 3px solid #3b82f6;
  background: white;
}

.station .name {
  color: white;   /* 👈 FIX */
  font-size: 13px;
  margin-left: 20px;
  margin-top: -18px;
  white-space: nowrap;
}

/* LINES */
svg {
  position: absolute;
  width: 3000px;
  height: 2000px;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="topbar">
  🚇 МЕТРОПАЛИТЕН-КПРС

  <div>
    <button onclick="addStation()">➕</button>
    <button onclick="toggleLine()">➖ Линия</button>

    <select id="colorPick">
      <option value="#3b82f6">Blue</option>
      <option value="#ef4444">Red</option>
      <option value="#22c55e">Green</option>
      <option value="#f59e0b">Orange</option>
      <option value="#a855f7">Purple</option>
    </select>
  </div>
</div>

<div id="wrap">

  <!-- GRID -->
  <svg id="grid"></svg>

  <!-- LINES -->
  <svg id="lines"></svg>

  <!-- STATIONS -->
  <div id="canvas"></div>

</div>

<script>

const GRID = 50;

let stations = [];
let lines = [];

let lineMode = false;
let selected = [];

let drag = null;

const canvas = document.getElementById("canvas");
const linesSvg = document.getElementById("lines");
const gridSvg = document.getElementById("grid");

/* ===== GRID (static, fixed, visible always) ===== */
function drawGrid() {
  const w = 3000;
  const h = 2000;

  for (let x = 0; x <= w; x += GRID) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", x);
    l.setAttribute("y1", 0);
    l.setAttribute("x2", x);
    l.setAttribute("y2", h);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }

  for (let y = 0; y <= h; y += GRID) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", 0);
    l.setAttribute("y1", y);
    l.setAttribute("x2", w);
    l.setAttribute("y2", y);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }
}

/* ===== RENDER LINES ===== */
function renderLines() {
  linesSvg.innerHTML = "";

  lines.forEach(l => {
    const a = stations[l.a];
    const b = stations[l.b];
    if (!a || !b) return;

    const dx = (b.x - a.x) / 2;

    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",
      `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`
    );

    path.setAttribute("stroke", l.color);
    path.setAttribute("stroke-width", "6");
    path.setAttribute("fill", "none");

    linesSvg.appendChild(path);
  });
}

/* ===== RENDER STATIONS ===== */
function renderStations() {
  canvas.innerHTML = "";

  stations.forEach((s,i) => {

    const el = document.createElement("div");
    el.className = "station";
    el.style.left = s.x + "px";
    el.style.top = s.y + "px";

    el.innerHTML = `
      <div class="dot" style="border-color:${s.color}"></div>
      <div class="name">${s.name}</div>
    `;

    /* DRAG FIX (real HTML drag, not SVG conflict) */
    el.onmousedown = (e) => {
      drag = i;

      if (lineMode) {
        selected.push(i);

        if (selected.length === 2) {
          lines.push({
            a: selected[0],
            b: selected[1],
            color: document.getElementById("colorPick").value
          });

          selected = [];
          renderLines();
        }

        drag = null;
      }
    };

    /* change name */
    el.ondblclick = () => {
      const name = prompt("Название:", s.name);
      if (name) {
        stations[i].name = name;
        renderStations();
      }
    };

    /* change color */
    el.oncontextmenu = (e) => {
      e.preventDefault();
      const color = prompt("Цвет станции (hex):", s.color);
      if (color) {
        stations[i].color = color;
        renderStations();
      }
    };

    canvas.appendChild(el);
  });
}

/* ===== GLOBAL MOVE FIX ===== */
window.addEventListener("mousemove", (e) => {
  if (drag !== null) {
    stations[drag].x += e.movementX;
    stations[drag].y += e.movementY;

    renderStations();
    renderLines();
  }
});

window.addEventListener("mouseup", () => {
  drag = null;
});

/* ===== ACTIONS ===== */
function addStation() {
  stations.push({
    name: "Station",
    x: 200 + Math.random()*400,
    y: 200 + Math.random()*300,
    color: "#3b82f6"
  });

  renderStations();
}

function toggleLine() {
  lineMode = !lineMode;
  selected = [];
  alert(lineMode ? "Line ON" : "Line OFF");
}

/* ===== INIT ===== */
drawGrid();
renderStations();

</script>

</body>
</html>
