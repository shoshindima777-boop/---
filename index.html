<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Metro Editor v2 Clean</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f14;
  overflow: hidden;
  color: white;
}

#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

button, select {
  background: #1b2330;
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #273246;
}

#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  position: relative;
  overflow: hidden;
  cursor: grab;
}

#world {
  position: absolute;
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

svg {
  position: absolute;
  width: 3000px;
  height: 2000px;
  pointer-events: none;
}

/* GRID */
.grid {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
}

/* STATION */
.station {
  position: absolute;
  cursor: grab;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 3px solid #3b82f6;
  background: white;
}

.name {
  color: white;
  font-size: 13px;
  margin-left: 20px;
  margin-top: -18px;
}

/* selected highlight */
.selected .dot {
  transform: scale(1.2);
}
</style>
</head>

<body>

<div id="topbar">

  🚇 METRO EDITOR v2

  <button onclick="addStation()">➕</button>
  <button onclick="toggleLine()">➖ Line</button>
  <button onclick="toggleDelete()">🗑</button>

  <select id="lineColor">
    <option value="#3b82f6">Blue</option>
    <option value="#ef4444">Red</option>
    <option value="#22c55e">Green</option>
    <option value="#f59e0b">Orange</option>
    <option value="#a855f7">Purple</option>
  </select>

</div>

<div id="wrap">
  <div id="world">

    <svg id="grid"></svg>
    <svg id="lines"></svg>

    <div id="stations"></div>

  </div>
</div>

<script>

/* STATE */
let stations = [];
let lines = [];

let drag = null;

let lineMode = false;
let deleteMode = false;
let selected = [];

let scale = 1;
let offsetX = 0;
let offsetY = 0;

const world = document.getElementById("world");
const stationsEl = document.getElementById("stations");
const linesSvg = document.getElementById("lines");
const gridSvg = document.getElementById("grid");

/* GRID */
function drawGrid() {
  const step = 50;
  const w = 3000;
  const h = 2000;

  for (let x = 0; x <= w; x += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", x);
    l.setAttribute("y1", 0);
    l.setAttribute("x2", x);
    l.setAttribute("y2", h);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }

  for (let y = 0; y <= h; y += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", 0);
    l.setAttribute("y1", y);
    l.setAttribute("x2", w);
    l.setAttribute("y2", y);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }
}

/* LINE CURVE */
function curve(a,b) {
  const dx = (b.x - a.x) / 2;
  return `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`;
}

/* RENDER LINES */
function renderLines() {
  linesSvg.innerHTML = "";

  lines.forEach((l,i) => {
    const a = stations[l.a];
    const b = stations[l.b];
    if (!a || !b) return;

    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d", curve(a,b));
    p.setAttribute("stroke", l.color);
    p.setAttribute("stroke-width", "6");
    p.setAttribute("fill", "none");

    /* delete line */
    p.onclick = () => {
      if (!deleteMode) return;
      lines.splice(i,1);
      render();
    };

    linesSvg.appendChild(p);
  });
}

/* RENDER STATIONS */
function renderStations() {
  stationsEl.innerHTML = "";

  stations.forEach((s,i) => {

    const el = document.createElement("div");
    el.className = "station";

    el.style.left = s.x + "px";
    el.style.top = s.y + "px";

    el.innerHTML = `
      <div class="dot" style="border-color:${s.color}"></div>
      <div class="name">${s.name}</div>
    `;

    if (selected.includes(i)) {
      el.classList.add("selected");
    }

    /* drag */
    el.onmousedown = () => {
      drag = i;

      if (lineMode) {
        selected.push(i);

        if (selected.length === 2) {
          lines.push({
            a: selected[0],
            b: selected[1],
            color: document.getElementById("lineColor").value
          });

          selected = [];
          renderLines();
        }

        drag = null;
      }

      if (deleteMode) {
        stations.splice(i,1);
        lines = lines.filter(l => l.a !== i && l.b !== i);
        render();
      }
    };

    /* rename */
    el.ondblclick = () => {
      const name = prompt("Название:", s.name);
      if (name) {
        stations[i].name = name;
        renderStations();
      }
    };

    /* change station color */
    el.oncontextmenu = (e) => {
      e.preventDefault();
      const c = prompt("Цвет станции (hex):", s.color);
      if (c) {
        stations[i].color = c;
        renderStations();
      }
    };

    stationsEl.appendChild(el);
  });
}

/* RENDER ALL */
function render() {
  renderStations();
  renderLines();
}

/* ACTIONS */
function addStation() {
  stations.push({
    name: "Station",
    x: 200 + Math.random()*400,
    y: 200 + Math.random()*300,
    color: "#3b82f6"
  });

  renderStations();
}

/* MODES */
function toggleLine() {
  lineMode = !lineMode;
  selected = [];
  alert(lineMode ? "Line mode ON" : "OFF");
}

function toggleDelete() {
  deleteMode = !deleteMode;
  alert(deleteMode ? "Delete ON" : "OFF");
}

/* PAN + ZOOM */
window.addEventListener("mousemove", (e) => {

  if (drag !== null) {
    stations[drag].x += e.movementX;
    stations[drag].y += e.movementY;

    renderStations();
    renderLines();
  }

  if (e.buttons === 1 && drag === null) {
    offsetX += e.movementX;
    offsetY += e.movementY;

    world.style.transform =
      `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  }
});

window.addEventListener("mouseup", () => {
  drag = null;
});

window.addEventListener("wheel", (e) => {
  scale *= e.deltaY < 0 ? 1.1 : 0.9;
  scale = Math.min(Math.max(0.5, scale), 3);

  world.style.transform =
    `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});

/* INIT */
drawGrid();
render();

world.style.transform =
  `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

</script>

</body>
</html>
