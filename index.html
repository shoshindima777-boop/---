<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Metro Editor v4 (Fixed Grid)</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f14;
  overflow: hidden;
  color: white;
}

#toolbar {
  height: 56px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

button, select {
  background: #1b2330;
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #273246;
}

#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  overflow: hidden;
  position: relative;
  cursor: grab;
}

#wrap:active {
  cursor: grabbing;
}

svg {
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

/* STATIONS */
.station circle {
  fill: white;
  stroke: #3b82f6;
  stroke-width: 3;
  cursor: pointer;
}

.station text {
  fill: #e5e7eb;
  font-size: 13px;
  user-select: none;
}

/* LINES */
path {
  stroke-width: 6;
  fill: none;
}

/* GRID */
.grid {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
}
</style>
</head>

<body>

<div id="toolbar">
  <button onclick="addStation()">➕ Станция</button>
  <button onclick="addLineMode()">➖ Линия</button>
  <button onclick="deleteMode()">🗑 Delete</button>
  <button onclick="save()">💾 Save</button>
  <button onclick="load()">📂 Load</button>

  <select id="colorPicker">
    <option value="#3b82f6">Blue</option>
    <option value="#ef4444">Red</option>
    <option value="#22c55e">Green</option>
    <option value="#f59e0b">Orange</option>
  </select>
</div>

<div id="wrap">
  <svg id="svg"></svg>
</div>

<script>

/* ===================== */
/* CORE SETTINGS */
/* ===================== */

const GRID = 50;

let stations = [];
let lines = [];

let dragStation = null;
let isPanning = false;

let scale = 1;
let offsetX = 0;
let offsetY = 0;

let lineMode = false;
let deleteModeActive = false;
let selectedStations = [];

const svg = document.getElementById("svg");

/* ===================== */
/* SNAP SYSTEM */
/* ===================== */

function snap(v) {
  return Math.round(v / GRID) * GRID;
}

/* ===================== */
/* GRID */
/* ===================== */

function drawGrid() {
  const w = 3000;
  const h = 2000;

  for (let x = 0; x <= w; x += GRID) {
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x);
    line.setAttribute("y1", 0);
    line.setAttribute("x2", x);
    line.setAttribute("y2", h);
    line.classList.add("grid");
    svg.appendChild(line);
  }

  for (let y = 0; y <= h; y += GRID) {
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", 0);
    line.setAttribute("y1", y);
    line.setAttribute("x2", w);
    line.setAttribute("y2", y);
    line.classList.add("grid");
    svg.appendChild(line);
  }
}

/* ===================== */
/* CURVE (FIXED SNAP) */
/* ===================== */

function curve(a, b) {
  const ax = snap(a.x);
  const ay = snap(a.y);
  const bx = snap(b.x);
  const by = snap(b.y);

  const dx = (bx - ax) / 2;

  return `M ${ax} ${ay} C ${ax + dx} ${ay}, ${bx - dx} ${by}, ${bx} ${by}`;
}

/* ===================== */
/* RENDER */
/* ===================== */

function render() {
  svg.innerHTML = "";

  svg.style.transform =
    `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

  drawGrid();

  /* LINES */
  lines.forEach((l, idx) => {
    const a = stations[l.a];
    const b = stations[l.b];
    if (!a || !b) return;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", curve(a, b));
    path.setAttribute("stroke", l.color);

    /* delete line */
    path.onclick = () => {
      if (!deleteModeActive) return;
      lines.splice(idx, 1);
      render();
    };

    svg.appendChild(path);
  });

  /* STATIONS */
  stations.forEach((s, i) => {

    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.classList.add("station");

    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", s.x);
    c.setAttribute("cy", s.y);
    c.setAttribute("r", 10);

    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", s.x + 14);
    t.setAttribute("y", s.y + 5);
    t.textContent = s.name;

    c.onmousedown = () => {

      if (deleteModeActive) {
        stations.splice(i, 1);
        lines = lines.filter(l => l.a !== i && l.b !== i);
        render();
        return;
      }

      if (lineMode) {
        selectedStations.push(i);

        if (selectedStations.length === 2) {
          lines.push({
            a: selectedStations[0],
            b: selectedStations[1],
            color: document.getElementById("colorPicker").value
          });

          selectedStations = [];
          render();
        }
      } else {
        dragStation = i;
      }
    };

    c.ondblclick = () => {
      const name = prompt("Name:", s.name);
      if (name) {
        stations[i].name = name;
        render();
      }
    };

    g.appendChild(c);
    g.appendChild(t);
    svg.appendChild(g);
  });
}

/* ===================== */
/* EVENTS */
/* ===================== */

window.addEventListener("mousemove", (e) => {

  if (dragStation !== null) {
    stations[dragStation].x = snap(stations[dragStation].x + e.movementX / scale);
    stations[dragStation].y = snap(stations[dragStation].y + e.movementY / scale);
    render();
    return;
  }

  if (isPanning) {
    offsetX += e.movementX;
    offsetY += e.movementY;
    render();
  }
});

window.addEventListener("mouseup", () => {
  dragStation = null;
  isPanning = false;
});

/* PAN */
document.getElementById("wrap").addEventListener("mousedown", (e) => {
  if (e.target.tagName === "svg") isPanning = true;
});

/* ZOOM */
window.addEventListener("wheel", (e) => {
  if (e.deltaY < 0) scale += 0.1;
  else scale -= 0.1;

  scale = Math.min(Math.max(0.5, scale), 3);
  render();
});

/* ===================== */
/* ACTIONS */
/* ===================== */

function addStation() {
  stations.push({
    name: "Station",
    x: snap(300 + Math.random() * 500),
    y: snap(200 + Math.random() * 300)
  });
  render();
}

function addLineMode() {
  lineMode = !lineMode;
  selectedStations = [];
  alert(lineMode ? "Line mode ON" : "Line mode OFF");
}

function deleteMode() {
  deleteModeActive = !deleteModeActive;
  alert(deleteModeActive ? "Delete ON" : "Delete OFF");
}

/* ===================== */
/* SAVE / LOAD */
/* ===================== */

function save() {
  localStorage.setItem("metro_v4", JSON.stringify({stations, lines}));
}

function load() {
  const data = localStorage.getItem("metro_v4");
  if (data) {
    const obj = JSON.parse(data);
    stations = obj.stations || [];
    lines = obj.lines || [];
  }
  render();
}

/* INIT */
load();
render();

</script>

</body>
</html>
