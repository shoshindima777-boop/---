<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 ВСТАВЬ СЮДА СВОЙ CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDYAqia7btyRi6nfeg7yUlhVVCp9jruLuc",
  authDomain: "underground-kprs.firebaseapp.com",
  databaseURL: "https://underground-kprs-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "underground-kprs",
  storageBucket: "underground-kprs.firebasestorage.app",
  messagingSenderId: "119610192330",
  appId: "1:119610192330:web:531484cb95d7a59beedf33",
  measurementId: "G-Y6MRFTEWVH"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const docRef = doc(db, "metro", "map");

/* ====== DATA ====== */
let stations = [];
let lines = [];

/* ====== LOAD REALTIME ====== */
onSnapshot(docRef, (snap) => {
  if (snap.exists()) {
    const data = snap.data();
    stations = data.stations || [];
    lines = data.lines || [];
    render();
  }
});

/* ====== SAVE ====== */
async function saveToCloud() {
  await setDoc(docRef, {
    stations,
    lines
  });
}

/* ====== UI HOOK ====== */
window.save = saveToCloud;

/* ====== YOUR EXISTING FUNCTIONS ====== */
/* просто вызывай save() вместо localStorage */

window.addStation = function() {
  stations.push({
    name: "Station",
    x: 200 + Math.random() * 400,
    y: 200 + Math.random() * 300
  });
  saveToCloud();
};

window.addLine = function() {
  alert("Пока оставляем как есть — дальше улучшим");
};

/* render() остаётся твоей */
</script>
