<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>МЕТРОПАЛИТЕН-КПРС</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f14;
  overflow: hidden;
  color: white;
}

/* TOP BAR */
#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-weight: bold;
}

#title {
  font-size: 16px;
  letter-spacing: 1px;
}

/* TOOLBAR */
#toolbar {
  display: flex;
  gap: 8px;
}

button, select {
  background: #1b2330;
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #273246;
}

/* LAYOUT */
#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  overflow: hidden;
  position: relative;
  cursor: grab;
}

#wrap:active {
  cursor: grabbing;
}

svg {
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

/* GRID */
.grid {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
}

/* STATION */
.station circle {
  fill: white;
  stroke: #3b82f6;
  stroke-width: 3;
  cursor: pointer;
}

.station.selected circle {
  fill: #f59e0b;
  stroke: #f59e0b;
}

.station text {
  fill: #e5e7eb;
  font-size: 13px;
  user-select: none;
}

/* LINES */
path {
  stroke-width: 6;
  fill: none;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="title">🚇 МЕТРОПАЛИТЕН-КПРС</div>

  <div id="toolbar">
    <button onclick="addStation()">➕</button>
    <button onclick="addLineMode()">➖</button>
    <button onclick="deleteMode()">🗑</button>
    <button onclick="save()">💾</button>
    <button onclick="load()">📂</button>
  </div>
</div>

<div id="wrap">
  <svg id="svg"></svg>
</div>

<script>

const GRID = 50;

let stations = [];
let lines = [];

let selected = null;
let dragStation = null;
let isPanning = false;

let lineMode = false;
let deleteModeActive = false;
let selectedStations = [];

let scale = 1;
let offsetX = 0;
let offsetY = 0;

const svg = document.getElementById("svg");

/* SNAP */
function snap(v) {
  return Math.round(v / GRID) * GRID;
}

/* GRID */
function drawGrid() {
  const w = 3000;
  const h = 2000;

  for (let x = 0; x <= w; x += GRID) {
    const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
    l.setAttribute("x1", x);
    l.setAttribute("y1", 0);
    l.setAttribute("x2", x);
    l.setAttribute("y2", h);
    l.classList.add("grid");
    svg.appendChild(l);
  }

  for (let y = 0; y <= h; y += GRID) {
    const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
    l.setAttribute("x1", 0);
    l.setAttribute("y1", y);
    l.setAttribute("x2", w);
    l.setAttribute("y2", y);
    l.classList.add("grid");
    svg.appendChild(l);
  }
}

/* CURVE */
function curve(a, b) {
  const ax = a.x, ay = a.y;
  const bx = b.x, by = b.y;
  const dx = (bx - ax) / 2;

  return `M ${ax} ${ay} C ${ax + dx} ${ay}, ${bx - dx} ${by}, ${bx} ${by}`;
}

/* RENDER */
function render() {
  svg.innerHTML = "";

  svg.style.transform =
    `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

  drawGrid();

  /* LINES */
  lines.forEach(l => {
    const a = stations[l.a];
    const b = stations[l.b];
    if (!a || !b) return;

    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
    p.setAttribute("d", curve(a,b));
    p.setAttribute("stroke", l.color);

    svg.appendChild(p);
  });

  /* STATIONS */
  stations.forEach((s,i) => {

    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.classList.add("station");

    if (selected === i) g.classList.add("selected");

    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", s.x);
    c.setAttribute("cy", s.y);
    c.setAttribute("r", 10);

    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", s.x + 14);
    t.setAttribute("y", s.y + 5);
    t.textContent = s.name;

    c.onmousedown = () => {

      if (deleteModeActive) {
        stations.splice(i,1);
        lines = lines.filter(l => l.a !== i && l.b !== i);
        render();
        return;
      }

      if (lineMode) {
        selectedStations.push(i);

        if (selectedStations.length === 2) {
          lines.push({
            a: selectedStations[0],
            b: selectedStations[1],
            color: "#3b82f6"
          });

          selectedStations = [];
          render();
        }
      } else {
        selected = i;
        dragStation = i;
        render();
      }
    };

    c.ondblclick = () => {
      const name = prompt("Название:", s.name);
      if (name) {
        stations[i].name = name;
        render();
      }
    };

    g.appendChild(c);
    g.appendChild(t);
    svg.appendChild(g);
  });

  updatePanel();
}

/* PANEL */
function updatePanel() {
  if (selected === null) return;
}

/* EVENTS */
window.addEventListener("mousemove", (e) => {

  if (dragStation !== null) {
    stations[dragStation].x = snap(stations[dragStation].x + e.movementX / scale);
    stations[dragStation].y = snap(stations[dragStation].y + e.movementY / scale);
    render();
  }

  if (isPanning) {
    offsetX += e.movementX;
    offsetY += e.movementY;
    render();
  }
});

window.addEventListener("mouseup", () => {
  dragStation = null;
  isPanning = false;
});

/* PAN */
document.getElementById("wrap").addEventListener("mousedown", (e) => {
  if (e.target.tagName === "svg") isPanning = true;
});

/* ZOOM */
window.addEventListener("wheel", (e) => {
  scale += e.deltaY < 0 ? 0.1 : -0.1;
  scale = Math.min(Math.max(0.5, scale), 3);
  render();
});

/* ACTIONS */
function addStation() {
  stations.push({
    name: "Station",
    x: snap(300 + Math.random()*500),
    y: snap(200 + Math.random()*300)
  });
  render();
}

function addLineMode() {
  lineMode = !lineMode;
  selectedStations = [];
  alert(lineMode ? "Line ON" : "Line OFF");
}

function deleteMode() {
  deleteModeActive = !deleteModeActive;
  alert(deleteModeActive ? "Delete ON" : "Delete OFF");
}

/* SAVE/LOAD */
function save() {
  localStorage.setItem("metro_v5", JSON.stringify({stations, lines}));
}

function load() {
  const data = localStorage.getItem("metro_v5");
  if (data) {
    const obj = JSON.parse(data);
    stations = obj.stations || [];
    lines = obj.lines || [];
  }
  render();
}

/* INIT */
load();
render();

</script>

</body>
</html>
