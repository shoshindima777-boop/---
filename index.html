<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Metro Editor POLISHED + GRID</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f14;
  overflow: hidden;
  color: white;
}

#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

button, select {
  background: #1b2330;
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover { background:#273246; }

#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  position: relative;
  overflow: hidden;
}

#world {
  position: absolute;
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

/* SVG LAYERS */
svg {
  position: absolute;
  width: 3000px;
  height: 2000px;
  pointer-events: none;
}

.station {
  position: absolute;
  cursor: grab;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 3px solid #3b82f6;
  background: white;
}

.name {
  font-size: 13px;
  margin-left: 20px;
  margin-top: -18px;
}

/* GRID STYLE */
.grid line {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
}
</style>
</head>

<body>

<div id="topbar">
🚇 METRO POLISHED

<button onclick="addStation()">➕</button>
<button onclick="toggleLine()">➖ Line</button>
<button onclick="toggleDelete()">🗑</button>
<button onclick="exportMap()">💾</button>

<select id="lineColor">
  <option value="#3b82f6">Blue</option>
  <option value="#ef4444">Red</option>
  <option value="#22c55e">Green</option>
  <option value="#f59e0b">Orange</option>
</select>
</div>

<div id="wrap">
  <div id="world">

    <!-- GRID (ВОТ ОНА ВЕРНУЛАСЬ) -->
    <svg id="grid"></svg>

    <!-- LINES -->
    <svg id="lines"></svg>

    <!-- STATIONS -->
    <div id="stations"></div>

  </div>
</div>

<script>

/* STATE */
let stations = [];
let lines = [];

let lineMode = false;
let deleteMode = false;
let currentLine = null;

let drag = null;
let dragOffset = {x:0,y:0};

let scale = 1;
let offsetX = 0;
let offsetY = 0;

const world = document.getElementById("world");
const stationsEl = document.getElementById("stations");
const linesSvg = document.getElementById("lines");
const gridSvg = document.getElementById("grid");

/* GRID */
function drawGrid(){
  const step = 50;
  const w = 3000;
  const h = 2000;

  for(let x=0;x<=w;x+=step){
    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",x);
    l.setAttribute("y1",0);
    l.setAttribute("x2",x);
    l.setAttribute("y2",h);
    gridSvg.appendChild(l);
  }

  for(let y=0;y<=h;y+=step){
    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",0);
    l.setAttribute("y1",y);
    l.setAttribute("x2",w);
    l.setAttribute("y2",y);
    gridSvg.appendChild(l);
  }
}

/* CURVE */
function curve(a,b){
  const dx=(b.x-a.x)/2;
  return `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`;
}

/* RENDER OPTIMIZED */
let renderPending=false;

function render(){
  if(renderPending) return;
  renderPending=true;

  requestAnimationFrame(()=>{
    renderPending=false;
    renderStations();
    renderLines();
  });
}

/* LINES */
function renderLines(){
  linesSvg.innerHTML="";

  for(const line of lines){
    for(let i=0;i<line.stations.length-1;i++){
      const a=stations[line.stations[i]];
      const b=stations[line.stations[i+1]];
      if(!a||!b) continue;

      const p=document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d",curve(a,b));
      p.setAttribute("stroke",line.color);
      p.setAttribute("stroke-width","6");
      p.setAttribute("fill","none");

      linesSvg.appendChild(p);
    }
  }
}

/* STATIONS */
function renderStations(){
  stationsEl.innerHTML="";

  stations.forEach((s,i)=>{
    const el=document.createElement("div");
    el.className="station";

    el.style.left=s.x+"px";
    el.style.top=s.y+"px";

    el.innerHTML=`
      <div class="dot" style="border-color:${s.color}"></div>
      <div class="name">${s.name}</div>
    `;

    el.onmousedown=(e)=>{
      const p=screenToWorld(e.clientX,e.clientY);

      drag=i;
      dragOffset.x=p.x-s.x;
      dragOffset.y=p.y-s.y;

      if(lineMode && currentLine){
        currentLine.stations.push(i);
      }

      if(deleteMode){
        stations.splice(i,1);
        lines=lines.map(l=>({
          ...l,
          stations:l.stations.filter(x=>x!==i)
        })).filter(l=>l.stations.length>1);

        render();
      }
    };

    el.ondblclick=()=>{
      const n=prompt("name",s.name);
      if(n) stations[i].name=n;
      render();
    };

    stationsEl.appendChild(el);
  });
}

/* ADD */
function addStation(){
  stations.push({
    name:"Station",
    x:200+Math.random()*400,
    y:200+Math.random()*300,
    color:"#3b82f6"
  });
  render();
}

/* LINE */
function toggleLine(){
  lineMode=!lineMode;

  if(lineMode){
    currentLine={
      stations:[],
      color:document.getElementById("lineColor").value
    };
    lines.push(currentLine);
  }
}

/* DELETE */
function toggleDelete(){
  deleteMode=!deleteMode;
}

/* EXPORT */
function exportMap(){
  navigator.clipboard.writeText(JSON.stringify({stations,lines},null,2));
}

/* COORDS */
function screenToWorld(x,y){
  return {
    x:(x-offsetX)/scale,
    y:(y-offsetY)/scale
  };
}

/* MOVE */
window.addEventListener("mousemove",(e)=>{

  if(drag!==null){
    const p=screenToWorld(e.clientX,e.clientY);

    stations[drag].x=p.x-dragOffset.x;
    stations[drag].y=p.y-dragOffset.y;

    render();
    return;
  }

  if(e.buttons===1 && drag===null){
    offsetX+=e.movementX;
    offsetY+=e.movementY;

    world.style.transform=
      `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
  }
});

window.addEventListener("mouseup",()=>drag=null);

/* ZOOM */
window.addEventListener("wheel",(e)=>{
  scale*=e.deltaY<0?1.1:0.9;
  scale=Math.min(Math.max(0.5,scale),3);

  world.style.transform=
    `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
});

/* INIT */
drawGrid();
render();

world.style.transform=
  `translate(${offsetX}px,${offsetY}px) scale(${scale})`;

</script>

</body>
</html>
