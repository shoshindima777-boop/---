<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>МЕТРОПАЛИТЕН-КПРС</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f14;
  overflow: hidden;
  color: white;
}

/* TOP */
#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-weight: bold;
}

/* WRAP */
#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  position: relative;
  overflow: hidden;
  cursor: grab;
}

/* WORLD (everything moves here) */
#world {
  position: absolute;
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

/* GRID */
.grid {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
}

/* STATION */
.station {
  position: absolute;
  user-select: none;
  cursor: grab;
}

.station .dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: white;
  border: 3px solid #3b82f6;
}

.station .name {
  color: white;
  font-size: 13px;
  margin-left: 20px;
  margin-top: -18px;
  white-space: nowrap;
}

/* LINES */
svg {
  position: absolute;
  width: 3000px;
  height: 2000px;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="topbar">
  🚇 МЕТРОПАЛИТЕН-КПРС

  <div>
    <button onclick="addStation()">➕</button>
    <button onclick="toggleLine()">➖ Линия</button>
  </div>
</div>

<div id="wrap">
  <div id="world">

    <svg id="grid"></svg>
    <svg id="lines"></svg>

    <div id="stations"></div>

  </div>
</div>

<script>

const GRID = 50;

/* WORLD STATE */
let stations = [];
let lines = [];

let lineMode = false;
let selected = [];

let dragStation = null;

/* CAMERA */
let scale = 1;
let offsetX = 0;
let offsetY = 0;

const world = document.getElementById("world");
const stationsEl = document.getElementById("stations");
const linesSvg = document.getElementById("lines");
const gridSvg = document.getElementById("grid");

/* ================= GRID ================= */
function drawGrid() {
  const w = 3000;
  const h = 2000;

  for (let x = 0; x <= w; x += GRID) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", x);
    l.setAttribute("y1", 0);
    l.setAttribute("x2", x);
    l.setAttribute("y2", h);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }

  for (let y = 0; y <= h; y += GRID) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", 0);
    l.setAttribute("y1", y);
    l.setAttribute("x2", w);
    l.setAttribute("y2", y);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }
}

/* ================= COORD FIX (IMPORTANT) ================= */
function toScreen(x, y) {
  return {
    x: x * scale + offsetX,
    y: y * scale + offsetY
  };
}

function toWorld(x, y) {
  return {
    x: (x - offsetX) / scale,
    y: (y - offsetY) / scale
  };
}

/* ================= CURVE ================= */
function curve(a, b) {
  const dx = (b.x - a.x) / 2;

  return `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`;
}

/* ================= RENDER LINES ================= */
function renderLines() {
  linesSvg.innerHTML = "";

  lines.forEach(l => {
    const a = stations[l.a];
    const b = stations[l.b];
    if (!a || !b) return;

    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d", curve(a,b));
    p.setAttribute("stroke", "#3b82f6");
    p.setAttribute("stroke-width", "6");
    p.setAttribute("fill", "none");

    linesSvg.appendChild(p);
  });
}

/* ================= RENDER STATIONS ================= */
function renderStations() {
  stationsEl.innerHTML = "";

  stations.forEach((s,i) => {

    const el = document.createElement("div");
    el.className = "station";

    const pos = toScreen(s.x, s.y);

    el.style.left = pos.x + "px";
    el.style.top = pos.y + "px";

    el.innerHTML = `
      <div class="dot" style="border-color:${s.color}"></div>
      <div class="name">${s.name}</div>
    `;

    /* DRAG FIX (world coordinates) */
    el.onmousedown = (e) => {
      dragStation = i;
    };

    el.ondblclick = () => {
      const name = prompt("Название:", s.name);
      if (name) {
        stations[i].name = name;
        renderStations();
      }
    };

    stationsEl.appendChild(el);
  });
}

/* ================= GLOBAL DRAG ================= */
window.addEventListener("mousemove", (e) => {

  /* drag station */
  if (dragStation !== null) {

    const wpos = toWorld(
      e.clientX,
      e.clientY - 56
    );

    stations[dragStation].x = wpos.x;
    stations[dragStation].y = wpos.y;

    renderStations();
    renderLines();
  }

  /* pan */
  if (e.buttons === 1 && dragStation === null) {
    offsetX += e.movementX;
    offsetY += e.movementY;

    world.style.transform =
      `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

    renderStations();
    renderLines();
  }
});

window.addEventListener("mouseup", () => {
  dragStation = null;
});

/* ================= ZOOM ================= */
window.addEventListener("wheel", (e) => {

  const zoom = e.deltaY < 0 ? 1.1 : 0.9;

  scale *= zoom;
  scale = Math.min(Math.max(0.5, scale), 2.5);

  world.style.transform =
    `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

  renderStations();
  renderLines();
});

/* ================= ACTIONS ================= */
function addStation() {
  stations.push({
    name: "Station",
    x: 200,
    y: 200,
    color: "#3b82f6"
  });

  renderStations();
}

/* ================= INIT ================= */
drawGrid();
renderStations();
renderLines();

world.style.transform =
  `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

</script>

</body>
</html>
