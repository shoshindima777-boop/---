<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Metro Editor v2 PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f14;
  overflow: hidden;
  color: white;
}

#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

button, select {
  background: #1b2330;
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #273246;
}

#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  position: relative;
  overflow: hidden;
  cursor: grab;
}

#world {
  position: absolute;
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

svg {
  position: absolute;
  width: 3000px;
  height: 2000px;
  pointer-events: none;
}

.station {
  position: absolute;
  cursor: grab;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 3px solid #3b82f6;
  background: white;
}

.name {
  color: white;
  font-size: 13px;
  margin-left: 20px;
  margin-top: -18px;
}

.selected .dot {
  transform: scale(1.2);
}
</style>
</head>

<body>

<div id="topbar">
  🚇 METRO EDITOR v2 PRO

  <button onclick="addStation()">➕</button>
  <button onclick="toggleLine()">➖ Line</button>
  <button onclick="toggleDelete()">🗑</button>
  <button onclick="exportMap()">💾 Export</button>

  <select id="lineColor">
    <option value="#3b82f6">Blue</option>
    <option value="#ef4444">Red</option>
    <option value="#22c55e">Green</option>
    <option value="#f59e0b">Orange</option>
    <option value="#a855f7">Purple</option>
  </select>
</div>

<div id="wrap">
  <div id="world">
    <svg id="grid"></svg>
    <svg id="lines"></svg>
    <div id="stations"></div>
  </div>
</div>

<script>

/* STATE */
let stations = [];
let lines = [];
let graph = {};

let lineMode = false;
let deleteMode = false;
let currentLine = null;

let drag = null;
let dragOffset = {x:0,y:0};

let scale = 1;
let offsetX = 0;
let offsetY = 0;

const world = document.getElementById("world");
const stationsEl = document.getElementById("stations");
const linesSvg = document.getElementById("lines");
const gridSvg = document.getElementById("grid");

/* GRID */
function drawGrid() {
  const step = 50;
  const w = 3000;
  const h = 2000;

  for (let x = 0; x <= w; x += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", x);
    l.setAttribute("y1", 0);
    l.setAttribute("x2", x);
    l.setAttribute("y2", h);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }

  for (let y = 0; y <= h; y += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", 0);
    l.setAttribute("y1", y);
    l.setAttribute("x2", w);
    l.setAttribute("y2", y);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }
}

/* CURVE */
function curve(a,b) {
  const dx = (b.x - a.x) / 2;
  return `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`;
}

/* GRAPH */
function addConnection(a,b){
  if(!graph[a]) graph[a]=[];
  if(!graph[b]) graph[b]=[];
  graph[a].push(b);
  graph[b].push(a);
}

/* PATHFIND */
function findPath(start,end){
  let q=[[start]];
  let v=new Set();

  while(q.length){
    let p=q.shift();
    let n=p[p.length-1];

    if(n===end) return p;
    if(v.has(n)) continue;
    v.add(n);

    (graph[n]||[]).forEach(x=>{
      q.push([...p,x]);
    });
  }
  return null;
}

/* RENDER LINES */
function renderLines(){
  linesSvg.innerHTML="";

  lines.forEach(line=>{
    for(let i=0;i<line.stations.length-1;i++){
      const a=stations[line.stations[i]];
      const b=stations[line.stations[i+1]];
      if(!a||!b) continue;

      const p=document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d",curve(a,b));
      p.setAttribute("stroke",line.color);
      p.setAttribute("stroke-width","6");
      p.setAttribute("fill","none");

      linesSvg.appendChild(p);
    }
  });
}

/* RENDER STATIONS */
function renderStations(){
  stationsEl.innerHTML="";

  stations.forEach((s,i)=>{
    const el=document.createElement("div");
    el.className="station";

    el.style.left=s.x+"px";
    el.style.top=s.y+"px";

    el.innerHTML=`
      <div class="dot" style="border-color:${s.color}"></div>
      <div class="name">${s.name}</div>
    `;

    /* DRAG */
    el.onmousedown=(e)=>{
      drag=i;
      dragOffset.x=e.clientX-s.x;
      dragOffset.y=e.clientY-s.y;

      if(lineMode && currentLine){
        currentLine.stations.push(i);
      }

      if(deleteMode){
        stations.splice(i,1);
        lines=lines.filter(l=>!l.stations.includes(i));
        render();
      }
    };

    el.ondblclick=()=>{
      const n=prompt("Name:",s.name);
      if(n) stations[i].name=n;
      renderStations();
    };

    el.oncontextmenu=(e)=>{
      e.preventDefault();
      const c=prompt("Color:",s.color);
      if(c) stations[i].color=c;
      renderStations();
    };

    stationsEl.appendChild(el);
  });
}

/* RENDER ALL */
function render(){
  renderStations();
  renderLines();
}

/* ADD STATION */
function addStation(){
  stations.push({
    name:"Station",
    x:200+Math.random()*400,
    y:200+Math.random()*300,
    color:"#3b82f6"
  });
  renderStations();
}

/* LINE MODE */
function toggleLine(){
  lineMode=!lineMode;

  if(lineMode){
    currentLine={
      stations:[],
      color:document.getElementById("lineColor").value
    };
    lines.push(currentLine);
  }

  alert(lineMode?"Line ON":"OFF");
}

/* DELETE MODE */
function toggleDelete(){
  deleteMode=!deleteMode;
  alert(deleteMode?"Delete ON":"OFF");
}

/* EXPORT */
function exportMap(){
  navigator.clipboard.writeText(JSON.stringify({stations,lines}));
  alert("Copied JSON!");
}

/* MOVE + PAN */
window.addEventListener("mousemove",(e)=>{

  if(drag!==null){
    stations[drag].x=e.clientX-dragOffset.x;
    stations[drag].y=e.clientY-dragOffset.y;

    render();
  }

  if(e.buttons===1 && drag===null){
    offsetX+=e.movementX;
    offsetY+=e.movementY;

    world.style.transform=
      `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
  }
});

window.addEventListener("mouseup",()=>{
  drag=null;
});

/* ZOOM */
window.addEventListener("wheel",(e)=>{
  scale*=e.deltaY<0?1.1:0.9;
  scale=Math.min(Math.max(0.5,scale),3);

  world.style.transform=
    `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
});

/* INIT */
drawGrid();
render();

world.style.transform=
  `translate(${offsetX}px,${offsetY}px) scale(${scale})`;

</script>

</body>
</html>
