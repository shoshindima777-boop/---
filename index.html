<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Metro Editor v1</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0b0f14;
  font-family: Arial;
  color: white;
}

/* TOP */
#top {
  height: 56px;
  background: #151922;
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-weight: bold;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* WRAP */
#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  position: relative;
  overflow: hidden;
  cursor: grab;
}

/* WORLD (camera) */
#world {
  position: absolute;
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

/* GRID */
.grid {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
}

/* STATIONS */
.station {
  position: absolute;
  cursor: grab;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: white;
  border: 3px solid #3b82f6;
}

.name {
  color: white;
  font-size: 13px;
  margin-left: 20px;
  margin-top: -18px;
  white-space: nowrap;
}

/* LINES */
svg {
  position: absolute;
  width: 3000px;
  height: 2000px;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="top">🚇 METRO EDITOR v1 CLEAN</div>

<div id="wrap">

  <div id="world">
    <svg id="grid"></svg>
    <svg id="lines"></svg>
    <div id="stations"></div>
  </div>

</div>

<script>

/* ===== STATE ===== */
let stations = [];
let lines = [];

/* CAMERA */
let scale = 1;
let offsetX = 0;
let offsetY = 0;

/* DRAG */
let drag = null;

const world = document.getElementById("world");
const stationsEl = document.getElementById("stations");
const linesSvg = document.getElementById("lines");
const gridSvg = document.getElementById("grid");

/* ===== GRID ===== */
function drawGrid() {
  const step = 50;
  const w = 3000;
  const h = 2000;

  for (let x = 0; x <= w; x += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", x);
    l.setAttribute("y1", 0);
    l.setAttribute("x2", x);
    l.setAttribute("y2", h);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }

  for (let y = 0; y <= h; y += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", 0);
    l.setAttribute("y1", y);
    l.setAttribute("x2", w);
    l.setAttribute("y2", y);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }
}

/* ===== CURVE ===== */
function curve(a, b) {
  const dx = (b.x - a.x) / 2;
  return `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`;
}

/* ===== RENDER LINES ===== */
function renderLines() {
  linesSvg.innerHTML = "";

  lines.forEach(l => {
    const a = stations[l.a];
    const b = stations[l.b];
    if (!a || !b) return;

    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d", curve(a,b));
    p.setAttribute("stroke", "#3b82f6");
    p.setAttribute("stroke-width", "6");
    p.setAttribute("fill", "none");

    linesSvg.appendChild(p);
  });
}

/* ===== RENDER STATIONS ===== */
function renderStations() {
  stationsEl.innerHTML = "";

  stations.forEach((s,i) => {

    const el = document.createElement("div");
    el.className = "station";

    el.style.left = s.x + "px";
    el.style.top = s.y + "px";

    el.innerHTML = `
      <div class="dot"></div>
      <div class="name">${s.name}</div>
    `;

    el.onmousedown = () => {
      drag = i;
    };

    el.ondblclick = () => {
      const name = prompt("Название:", s.name);
      if (name) {
        stations[i].name = name;
        renderStations();
      }
    };

    stationsEl.appendChild(el);
  });
}

/* ===== EVENTS ===== */
window.addEventListener("mousemove", (e) => {

  /* drag station */
  if (drag !== null) {
    stations[drag].x += e.movementX;
    stations[drag].y += e.movementY;

    renderStations();
    renderLines();
  }

  /* pan */
  if (e.buttons === 1 && drag === null) {
    offsetX += e.movementX;
    offsetY += e.movementY;

    world.style.transform =
      `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  }
});

window.addEventListener("mouseup", () => {
  drag = null;
});

/* zoom */
window.addEventListener("wheel", (e) => {

  const zoom = e.deltaY < 0 ? 1.1 : 0.9;

  scale *= zoom;
  scale = Math.min(Math.max(0.5, scale), 3);

  world.style.transform =
    `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});

/* ===== ACTIONS ===== */
function addStation() {
  stations.push({
    name: "Station",
    x: 200 + Math.random() * 300,
    y: 200 + Math.random() * 300
  });

  renderStations();
}

/* ===== INIT ===== */
drawGrid();
renderStations();
renderLines();

world.style.transform =
  `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

</script>

</body>
</html>
