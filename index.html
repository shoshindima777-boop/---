<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Metro Map Editor</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

body {
  margin: 0;
  font-family: Inter, Arial;
  background: #0f1115;
  color: white;
  overflow: hidden;
}

/* TOP BAR */
#toolbar {
  height: 56px;
  background: rgba(20, 22, 28, 0.9);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

button {
  background: #1c2230;
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  font-weight: 500;
}

button:hover {
  background: #2a3245;
  transform: translateY(-1px);
}

/* LAYOUT */
#container {
  display: flex;
  height: calc(100vh - 56px);
}

/* SIDEBAR */
#sidebar {
  width: 260px;
  background: rgba(18, 20, 26, 0.95);
  border-right: 1px solid rgba(255,255,255,0.08);
  padding: 12px;
}

.panel {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
}

h3 {
  margin: 0 0 8px 0;
  font-size: 14px;
  opacity: 0.8;
}

/* MAP */
#map {
  flex: 1;
  position: relative;
  background: radial-gradient(circle at 30% 30%, #1a1f2e, #0f1115);
  overflow: hidden;
}

svg {
  width: 100%;
  height: 100%;
}

/* STATIONS */
.station {
  cursor: grab;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
}

.station-circle {
  fill: #ffffff;
  stroke: #3b82f6;
  stroke-width: 3;
}

.station:hover .station-circle {
  fill: #3b82f6;
}

/* LABEL */
.label {
  font-size: 12px;
  fill: #e5e7eb;
  user-select: none;
}

/* small glow */
.glow {
  filter: drop-shadow(0 0 6px rgba(59,130,246,0.6));
}
</style>
</head>

<body>

<div id="toolbar">
  <button onclick="addStation()">➕ Станция</button>
  <button onclick="save()">💾 Сохранить</button>
  <button onclick="load()">📂 Загрузить</button>
</div>

<div id="container">

  <div id="sidebar">
    <div class="panel">
      <h3>Редактор</h3>
      <p style="font-size:12px;opacity:0.7;">
        • Клик = создать станцию<br>
        • Drag = переместить<br>
        • Двойной клик = имя
      </p>
    </div>

    <div class="panel">
      <h3>Статус</h3>
      <p id="status" style="font-size:12px;opacity:0.7;">
        Готов к работе
      </p>
    </div>
  </div>

  <div id="map">
    <svg id="svg"></svg>
  </div>

</div>

<script>
let stations = [];
let dragTarget = null;

function setStatus(text) {
  document.getElementById("status").innerText = text;
}

function render() {
  const svg = document.getElementById("svg");
  svg.innerHTML = "";

  stations.forEach((s, i) => {

    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.classList.add("station", "glow");

    g.setAttribute("data-index", i);

    // circle
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", s.x);
    circle.setAttribute("cy", s.y);
    circle.setAttribute("r", 7);
    circle.classList.add("station-circle");

    // label
    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", s.x + 12);
    text.setAttribute("y", s.y + 4);
    text.classList.add("label");
    text.textContent = s.name;

    // events
    circle.onmousedown = () => {
      dragTarget = i;
      setStatus("Перемещение станции...");
    };

    circle.ondblclick = () => {
      const name = prompt("Название станции:", s.name);
      if (name) {
        stations[i].name = name;
        render();
      }
    };

    g.appendChild(circle);
    g.appendChild(text);
    svg.appendChild(g);
  });
}

/* drag */
window.addEventListener("mousemove", (e) => {
  if (dragTarget === null) return;

  const rect = document.getElementById("svg").getBoundingClientRect();
  stations[dragTarget].x = e.clientX - rect.left;
  stations[dragTarget].y = e.clientY - rect.top;

  render();
});

window.addEventListener("mouseup", () => {
  if (dragTarget !== null) setStatus("Готов к работе");
  dragTarget = null;
});

/* add station */
function addStation() {
  stations.push({
    name: "Станция",
    x: 200 + Math.random() * 300,
    y: 150 + Math.random() * 200
  });
  render();
}

/* save/load */
function save() {
  localStorage.setItem("metro", JSON.stringify(stations));
  setStatus("Сохранено ✔");
}

function load() {
  const data = localStorage.getItem("metro");
  if (data) {
    stations = JSON.parse(data);
    render();
    setStatus("Загружено ✔");
  }
}

/* init */
load();
render();
</script>

</body>
</html>
