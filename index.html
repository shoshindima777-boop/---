<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>МЕТРОПАЛИТЕН-КПРС</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f14;
  overflow: hidden;
  color: white;
}

#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  background: rgba(20,20,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-weight: bold;
}

#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  overflow: hidden;
  position: relative;
  cursor: grab;
}

#wrap:active { cursor: grabbing; }

svg {
  width: 3000px;
  height: 2000px;
  transform-origin: 0 0;
}

/* GRID */
.grid {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
}

/* STATION */
.station circle {
  fill: white;
  stroke: #3b82f6;
  stroke-width: 3;
  cursor: pointer;
}

.station.selected circle {
  fill: orange;
}

/* LINES */
path {
  stroke: #3b82f6;
  stroke-width: 6;
  fill: none;
}
</style>
</head>

<body>

<div id="topbar">
  🚇 МЕТРОПАЛИТЕН-КПРС

  <div>
    <button onclick="addStation()">➕</button>
    <button onclick="toggleLineMode()">➖ Линия</button>
    <button onclick="toggleDelete()">🗑</button>
  </div>
</div>

<div id="wrap">
  <svg id="svg"></svg>
</div>

<script>

const GRID = 50;

let stations = [];
let lines = [];

let dragStation = null;
let isPanning = false;

let lineMode = false;
let deleteMode = false;
let selected = [];
let activeStation = null;

let scale = 1;
let offsetX = 0;
let offsetY = 0;

const svg = document.getElementById("svg");

/* SNAP */
function snap(v) {
  return Math.round(v / GRID) * GRID;
}

/* GRID */
function drawGrid() {
  const w = 3000;
  const h = 2000;

  for (let x = 0; x <= w; x += GRID) {
    const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
    l.setAttribute("x1", x);
    l.setAttribute("y1", 0);
    l.setAttribute("x2", x);
    l.setAttribute("y2", h);
    l.classList.add("grid");
    svg.appendChild(l);
  }

  for (let y = 0; y <= h; y += GRID) {
    const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
    l.setAttribute("x1", 0);
    l.setAttribute("y1", y);
    l.setAttribute("x2", w);
    l.setAttribute("y2", y);
    l.classList.add("grid");
    svg.appendChild(l);
  }
}

/* CURVE */
function curve(a, b) {
  const dx = (b.x - a.x) / 2;
  return `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`;
}

/* RENDER */
function render() {
  svg.innerHTML = "";

  svg.style.transform =
    `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

  drawGrid();

  /* LINES */
  lines.forEach(l => {
    const a = stations[l.a];
    const b = stations[l.b];
    if (!a || !b) return;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", curve(a, b));
    path.setAttribute("stroke", l.color);

    svg.appendChild(path);
  });

  /* STATIONS */
  stations.forEach((s, i) => {

    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.classList.add("station");

    if (activeStation === i) g.classList.add("selected");

    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", s.x);
    c.setAttribute("cy", s.y);
    c.setAttribute("r", 10);

    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", s.x + 14);
    t.setAttribute("y", s.y + 5);
    t.textContent = s.name;

    c.onmousedown = () => {

      if (deleteMode) {
        stations.splice(i, 1);
        lines = lines.filter(l => l.a !== i && l.b !== i);
        render();
        return;
      }

      if (lineMode) {
        selected.push(i);

        if (selected.length === 2) {
          lines.push({
            a: selected[0],
            b: selected[1],
            color: "#3b82f6"
          });
          selected = [];
          render();
        }
        return;
      }

      activeStation = i;
      dragStation = i;
    };

    c.ondblclick = () => {
      const name = prompt("Название:", s.name);
      if (name) {
        stations[i].name = name;
        render();
      }
    };

    g.appendChild(c);
    g.appendChild(t);
    svg.appendChild(g);
  });
}

/* MOVE */
window.addEventListener("mousemove", (e) => {

  if (dragStation !== null) {
    stations[dragStation].x = snap(stations[dragStation].x + e.movementX / scale);
    stations[dragStation].y = snap(stations[dragStation].y + e.movementY / scale);
    render();
    return;
  }

  if (isPanning) {
    offsetX += e.movementX;
    offsetY += e.movementY;
    render();
  }
});

window.addEventListener("mouseup", () => {
  dragStation = null;
  isPanning = false;
});

/* PAN */
document.getElementById("wrap").addEventListener("mousedown", (e) => {
  if (e.target.tagName === "svg") isPanning = true;
});

/* ZOOM */
window.addEventListener("wheel", (e) => {
  scale += e.deltaY < 0 ? 0.1 : -0.1;
  scale = Math.min(Math.max(0.5, scale), 3);
  render();
});

/* ACTIONS */
function addStation() {
  stations.push({
    name: "Station",
    x: snap(300 + Math.random() * 400),
    y: snap(200 + Math.random() * 300)
  });
  render();
}

function toggleLineMode() {
  lineMode = !lineMode;
  selected = [];
  alert(lineMode ? "Line mode ON" : "Line OFF");
}

function toggleDelete() {
  deleteMode = !deleteMode;
  alert(deleteMode ? "Delete ON" : "Delete OFF");
}

/* INIT */
render();

</script>

</body>
</html>
