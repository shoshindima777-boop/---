<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Metro Editor v2 PRO</title>

<style>
:root {
  --bg-0: #060a10;
  --bg-1: #0c131c;
  --panel: #0e1722;
  --line-stroke: rgba(255,255,255,0.06);
  --ink: #eef3f9;
  --ink-dim: #7f93a8;
  --accent: #3b82f6;
  --mono: 'Consolas', 'SF Mono', 'Courier New', monospace;
}

body {
  margin: 0;
  font-family: -apple-system, "Segoe UI", Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 10%, rgba(59,130,246,0.06), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(168,85,247,0.05), transparent 40%),
    var(--bg-0);
  overflow: hidden;
  color: var(--ink);
  user-select: none;

  animation: flicker 0.12s infinite;
  filter: contrast(1.05) saturate(1.1);
}

/* ===== CRT OLD TV EFFECT ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.03) 1px,
      transparent 2px,
      transparent 4px
    );
  mix-blend-mode: overlay;
  opacity: 0.25;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10000;
  background: radial-gradient(circle at center,
    rgba(255,255,255,0.05),
    rgba(0,0,0,0.35)
  );
  opacity: 0.6;
}

@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.97; }
  100% { opacity: 1; }
}

#world {
  filter: blur(0.2px);
}

/* ===== ORIGINAL CODE ===== */

#topbar {
  height: 58px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  background: linear-gradient(180deg, #11181f, #0c131a);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 4px 18px rgba(0,0,0,0.35);
  position: relative;
  z-index: 20;
}

/* ... (остальной твой CSS без изменений) ... */

</style>
</head>

<body>

<div id="topbar">
  <div id="logo">
    <div class="badge">🚇</div>
    <div>
      METRO EDITOR
      <small>v2 PRO</small>
    </div>
  </div>

  <div class="divider"></div>

  <button onclick="addStation()">➕ Station</button>
  <button id="lineBtn" onclick="toggleLine()">➖ Line</button>
  <button id="deleteBtn" onclick="toggleDelete()">🗑 Delete</button>

  <div class="divider"></div>

  <button onclick="exportMap()">💾 Export</button>
  <button onclick="importMap()">📂 Import</button>
  <button onclick="resetView()">🎯 Reset</button>

  <select id="lineColor">
    <option value="#3b82f6">● Blue</option>
    <option value="#ef4444">● Red</option>
    <option value="#22c55e">● Green</option>
    <option value="#f59e0b">● Orange</option>
    <option value="#a855f7">● Purple</option>
  </select>

  <span id="hint"></span>
</div>

<div id="wrap">
  <div id="world">
    <svg id="grid"></svg>
    <svg id="lines"></svg>
    <div id="stations"></div>
  </div>
</div>

<div id="panel">
  <div id="panelStripe"></div>
  <div id="panelHead">
    <div>
      <div class="eyebrow">Station info</div>
      <div id="panelName">—</div>
    </div>
    <button id="panelClose" onclick="closePanel()">✕</button>
  </div>

  <div id="panelBody">
    <div class="panel-section">
      <div class="label">Lines through this station</div>
      <div id="panelLines"></div>
    </div>

    <div class="panel-section">
      <div class="label">Connected stations</div>
      <div id="panelNeighbors"></div>
    </div>
  </div>

  <div id="panelActions">
    <button onclick="renameSelected()">✎ Rename</button>
    <button onclick="recolorSelected()">🎨 Color</button>
  </div>
</div>

<script>
/* твой JS оставлен без изменений */
</script>

</body>
</html>
