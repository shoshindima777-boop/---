<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Metro Editor Centered</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0b0f14;
  font-family: Arial;
  color: white;
}

#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  background: #151922;
  font-weight: bold;
}

#wrap {
  width: 100vw;
  height: calc(100vh - 56px);
  position: relative;
  overflow: hidden;
  cursor: grab;
}

/* WORLD */
#world {
  position: absolute;
  width: 6000px;
  height: 4000px;
  left: 50%;
  top: 50%;
  transform-origin: center;
}

/* GRID */
svg {
  position: absolute;
  width: 6000px;
  height: 4000px;
}

/* STATIONS */
.station {
  position: absolute;
  user-select: none;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: white;
  border: 3px solid #3b82f6;
}

.name {
  color: white;
  font-size: 13px;
  margin-left: 20px;
  margin-top: -18px;
}

/* LINE */
path {
  stroke: #3b82f6;
  stroke-width: 6;
  fill: none;
}
</style>
</head>

<body>

<div id="topbar">🚇 METRO CENTER COORD SYSTEM</div>

<div id="wrap">
  <div id="world">

    <svg id="grid"></svg>
    <svg id="lines"></svg>
    <div id="stations"></div>

  </div>
</div>

<script>

/* ===== CENTER ORIGIN ===== */
const WORLD_W = 6000;
const WORLD_H = 4000;

/* CENTER POINT (0,0) */
const ORIGIN_X = WORLD_W / 2;
const ORIGIN_Y = WORLD_H / 2;

/* STATE */
let stations = [];
let lines = [];

let scale = 1;
let offsetX = 0;
let offsetY = 0;

let drag = null;

const world = document.getElementById("world");
const stationsEl = document.getElementById("stations");
const linesSvg = document.getElementById("lines");
const gridSvg = document.getElementById("grid");

/* ===== COORD SYSTEM (IMPORTANT FIX) ===== */
function toScreen(x, y) {
  return {
    x: ORIGIN_X + x,
    y: ORIGIN_Y + y
  };
}

/* reverse */
function toWorld(x, y) {
  return {
    x: x - ORIGIN_X,
    y: y - ORIGIN_Y
  };
}

/* ===== GRID ===== */
function drawGrid() {
  const step = 50;

  for (let x = 0; x <= WORLD_W; x += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", x);
    l.setAttribute("y1", 0);
    l.setAttribute("x2", x);
    l.setAttribute("y2", WORLD_H);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }

  for (let y = 0; y <= WORLD_H; y += step) {
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1", 0);
    l.setAttribute("y1", y);
    l.setAttribute("x2", WORLD_W);
    l.setAttribute("y2", y);
    l.setAttribute("stroke", "rgba(255,255,255,0.06)");
    gridSvg.appendChild(l);
  }
}

/* ===== CURVE ===== */
function curve(a,b){
  const dx = (b.x - a.x)/2;
  return `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`;
}

/* ===== RENDER ===== */
function render(){

  stationsEl.innerHTML = "";
  linesSvg.innerHTML = "";

  /* LINES */
  lines.forEach(l=>{
    const a = stations[l.a];
    const b = stations[l.b];
    if(!a || !b) return;

    const A = toScreen(a.x,a.y);
    const B = toScreen(b.x,b.y);

    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d", curve(A,B));
    p.setAttribute("stroke","#3b82f6");
    p.setAttribute("stroke-width","6");
    p.setAttribute("fill","none");

    linesSvg.appendChild(p);
  });

  /* STATIONS */
  stations.forEach((s,i)=>{

    const p = toScreen(s.x,s.y);

    const el = document.createElement("div");
    el.className = "station";
    el.style.left = p.x + "px";
    el.style.top = p.y + "px";

    el.innerHTML = `
      <div class="dot"></div>
      <div class="name">${s.name}</div>
    `;

    el.onmousedown = () => {
      drag = i;
    };

    stationsEl.appendChild(el);
  });
}

/* ===== EVENTS ===== */
window.addEventListener("mousemove",(e)=>{

  if(drag!==null){
    const w = toWorld(
      e.clientX,
      e.clientY - 56
    );

    stations[drag].x = w.x;
    stations[drag].y = w.y;

    render();
  }
});

window.addEventListener("mouseup",()=>drag=null);

/* zoom */
window.addEventListener("wheel",(e)=>{
  const z = e.deltaY < 0 ? 1.1 : 0.9;
  scale *= z;

  scale = Math.min(Math.max(0.5,scale),3);

  world.style.transform =
    `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
});

/* init transform */
world.style.transform =
  `translate(${offsetX}px,${offsetY}px) scale(${scale})`;

/* init grid + render */
drawGrid();
render();

</script>

</body>
</html>
